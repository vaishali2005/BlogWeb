{% extends 'base.html' %}
{% block title %} | Dashboard{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{url_for('static',filename = 'css/blog_home.css')}}">

{% endblock %}
{%block content%}
<div class="container">

    <div class="home-box">
        <h1>Welcome, {{current_user.username|capitalize}} <br> Home Page Of Blogs</h1>
        <p class="subtitle">Manage and explore blogs easily</p>
        <div class="action-buttons"></div>
        <a href="{{url_for('create_blog')}}" class="btn">Create Blog</a>
        <a href="{{url_for('view_blog')}}" class="btn">View My Blog</a>
        <a href="{{url_for('view_all_blogs')}}" class="btn">View All Blog</a>
    </div>
</div>
{% endblock %}
